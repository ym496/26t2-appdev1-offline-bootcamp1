{% extends 'base.html' %}

{% block title %}All Songs List{% endblock %}

{% block content %}
    <h1>🎶 Available Songs</h1>
    <ul>
        {% for song_id, song in songs.items() %}
            <li>
                <a href="/songs/{{ song_id }}">{{ song.title }} </a> by {{ song.artist }}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
