<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Symphony - Welcome</title>
</head>
<body>
    <nav>
        <a href="/">Home</a>
    </nav>
    <hr>

    <h1>Welcome to Symphony Music</h1>
    <p>Your personal gateway to infinite soundscapes.</p>

    <hr>
    <h3>Login to Your Account</h3>
    <form method="POST" action="/login-submit">
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" placeholder="Enter your name" required><br><br>
        
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>
        
        <button type="submit">Login</button>
    </form>

<footer>
    <hr>
    <p>&copy; last_updated: {{last_updated}}</p>
</footer>
</body>
</html>
